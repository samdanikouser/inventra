# Render Blueprint — one-click deploy for Inventra.
# Reference: https://render.com/docs/blueprint-spec
#
# What this provisions:
#   1. PostgreSQL database (free tier — 90-day expiry).
#   2. Django API web service (Python).
#   3. Next.js frontend web service (Node).
#
# After "Create Blueprint" the only remaining manual step is wiring the
# real Vercel/Render URL into NEXT_PUBLIC_API_URL (frontend) and
# CORS_ALLOWED_ORIGINS (backend) once both services are live.

databases:
  - name: inventra-db
    plan: free
    databaseName: inventra
    user: inventra_user

services:
  # ---------------------------------------------------------------------------
  # Django API
  # ---------------------------------------------------------------------------
  - type: web
    name: inventra-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn inventra_api.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_ENGINE
        value: postgresql
      - key: DB_HOST
        fromDatabase:
          name: inventra-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: inventra-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: inventra-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: inventra-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: inventra-db
          property: password
      # Update this AFTER the frontend service is live, with the real URL.
      - key: CORS_ALLOWED_ORIGINS
        value: https://inventra-web.onrender.com

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  - type: web
    name: inventra-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      # Update this AFTER the API service is live, with the real URL.
      - key: NEXT_PUBLIC_API_URL
        value: https://inventra-api.onrender.com/api
